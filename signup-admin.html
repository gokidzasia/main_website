<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GOKidz Asia</title>
    <link class="favicon" rel="icon" type="image/png" href="favicon-baby-face-yellow.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sniglet&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared.css?v=20260613-turquoise-nav">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login-page">
    <div class="login-scene" aria-hidden="true">
        <span class="login-shape login-shape-cloud shape-one"></span>
        <span class="login-shape login-shape-cloud shape-two"></span>
        <span class="login-shape login-shape-circle shape-three"></span>
        <span class="login-shape login-shape-star shape-four"></span>
        <span class="login-shape login-shape-ring shape-five"></span>
        <span class="login-shape login-shape-pill shape-six"></span>
        <span class="login-shape login-shape-cross shape-seven"></span>
        <span class="login-shape login-shape-dot shape-eight"></span>
        <span class="login-shape login-shape-wave shape-nine"></span>
        <span class="login-shape login-shape-book shape-ten"></span>
        <span class="login-shape login-shape-spark shape-eleven"></span>
        <span class="login-shape login-shape-arc shape-twelve"></span>
    </div>
    <main class="login-shell">
        <section class="login-card" aria-labelledby="admin-login-title">
            <img src="static-logo.png" alt="GOKidz Asia Logo" class="login-logo">
            <h1 id="admin-login-title">Admin Login</h1>
            <form id="admin-login-form" class="admin-form" novalidate>
                <label for="admin-email">Email</label>
                <input id="admin-email" name="email" type="email" autocomplete="username" required>

                <label for="admin-password">Password</label>
                <div class="password-field">
                    <input id="admin-password" name="password" type="password" autocomplete="current-password" required>
                    <button type="button" id="toggle-password" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
                </div>

                <p id="login-message" class="form-message" aria-live="polite"></p>
                <button type="submit" class="admin-primary-btn">Log In</button>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js?v=20260612-supabase"></script>
    <script src="js/admin-login.js?v=20260613-interactive-login"></script>
</body>
</html>
